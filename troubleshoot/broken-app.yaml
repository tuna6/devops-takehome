# DevOps Assignment — Part 3: Troubleshooting Challenge
# Run troubleshoot/prepare.sh first, then apply this file as-is.
# Diagnose and fix until troubleshoot/verify.sh prints PASS.
# Rules:
#   - Do NOT delete the default-deny NetworkPolicy — add least-privilege allow rules instead.
#   - Do NOT remove node taints or labels — fix the workloads, not the nodes.
---
apiVersion: v1
kind: Namespace
metadata:
  name: troubleshoot
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-config
  namespace: troubleshoot
data:
  index.html: |
    <html><body><h1>TROUBLESHOOT-OK</h1></body></html>
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: troubleshoot
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: troubleshoot
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: nginx
          image: nginx:1.25.99
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 16Gi
            limits:
              cpu: 500m
              memory: 16Gi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
      volumes:
        - name: html
          configMap:
            name: web-conf
---
apiVersion: v1
kind: Service
metadata:
  name: web-svc
  namespace: troubleshoot
spec:
  selector:
    app: webapp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
# Simulated AI inference workload. In production this runs on our GPU
# nodepool. It must end up Running on the GPU-labeled node — without
# touching the node's taint or labels.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-inference
  namespace: troubleshoot
  labels:
    app: ai-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-inference
  template:
    metadata:
      labels:
        app: ai-inference
    spec:
      nodeSelector:
        node-type: gpu
      containers:
        - name: inference
          image: busybox:1.36
          command: ["sh", "-c", "echo 'inference engine warm'; while true; do sleep 3600; done"]
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
