services:
  toolbox:
    build:
      context: ./toolbox
    image: elsa-devops-toolbox:local
    container_name: elsa-devops-toolbox
    working_dir: /workspace
    command: ["tail", "-f", "/dev/null"]
    environment:
      KUBECONFIG: /workspace/.kube/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/workspace:rw
      - /var/run/docker.sock:/var/run/docker.sock:rw
    restart: unless-stopped

  bootstrap:
    image: elsa-devops-toolbox:local
    depends_on:
      - toolbox
    working_dir: /workspace
    command: ["/workspace/scripts/00-bootstrap-cluster.sh"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/workspace:rw
      - /var/run/docker.sock:/var/run/docker.sock:rw
    restart: "no"
