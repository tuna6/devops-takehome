services:
  toolbox:
    build:
      context: ./toolbox
    image: elsa-devops-toolbox:local
    container_name: elsa-devops-toolbox
    working_dir: /workspace
    command: ["tail", "-f", "/dev/null"]
    environment:
      KUBECONFIG: /workspace/.kube/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"   # Prometheus port-forward
      - "3000:3000"   # Grafana port-forward
    volumes:
      - ./:/workspace:rw
      - /var/run/docker.sock:/var/run/docker.sock:rw
    restart: unless-stopped