name: CI

# Trigger: only on changes to source code or Dockerfile.
# helm/quote-api/values.yaml is intentionally excluded so the write-back
# commit below does not re-trigger this workflow (loop prevention, layer 1).
# [skip ci] in the write-back commit message is the belt-and-suspenders layer 2.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Dockerfile'

permissions:
  contents: write   # needed for the values.yaml write-back commit + push
  packages: write   # needed to publish to GHCR

jobs:
  # ── Job 1: Helm lint (parallel, cheap) ────────────────────────────────────
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Helm lint
        run: helm lint ./helm/quote-api

  # ── Job 2: SAST → build → scan image → push → write-back ─────────────────
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Explicit token so downstream git push uses write-enabled credentials
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── SAST gate (must run BEFORE the image is built) ──────────────────
      - name: Semgrep SAST scan
        run: |
          pip install semgrep
          semgrep scan --config auto src/ --error

      # ── Build image locally (no push yet) ───────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (load into local daemon, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}

      # ── Trivy image scan (bonus gate — blocks push on HIGH/CRITICAL) ─────
      - name: Trivy image scan (HIGH/CRITICAL gate)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          # ignore-unfixed: only fail on CVEs that have a fix available;
          # unfixable CVEs in the base image can't be remediated without an
          # upstream patch and would permanently block every CI run.
          ignore-unfixed: true

      # ── Push to GHCR (only if both scans pass) ──────────────────────────
      - name: Push image to GHCR
        run: docker push ghcr.io/${{ github.repository }}:${{ github.sha }}

      # ── GitOps write-back: update Helm values with new image tag ─────────
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image.tag in helm/quote-api/values.yaml
        env:
          SHA: ${{ github.sha }}
        run: |
          yq -i '.image.tag = strenv(SHA)' helm/quote-api/values.yaml

      - name: Commit and push write-back
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet helm/quote-api/values.yaml; then
            echo "No diff — image.tag already set to ${{ github.sha }}, skipping commit"
          else
            git add helm/quote-api/values.yaml
            git commit -m "ci: update image tag to ${{ github.sha }} [skip ci]"
            git push
          fi
