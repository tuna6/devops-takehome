# CPU sizing rationale:
#   /api/quote burns ~100ms of SHA-256 per request (real CPU, not sleep).
#   At 1 RPS per pod: 100ms × 1 = 100m CPU consumed continuously.
#   request=100m → HPA 70% target fires at ~0.7 RPS per pod (2.1 RPS across 3 replicas).
#   limit=500m → pod can burst up to ~5 RPS before hitting the cap (500ms CPU / 100ms/req).
#   Memory: Python 3.12 Alpine + FastAPI + uvicorn idle ≈ 50–60 MB; 128Mi gives 2× headroom.
image:
  repository: ghcr.io/tuna6/devops-takehome
  tag: "e0eb815ee7a71addbd6191db5c83778202c61d70"
  pullPolicy: IfNotPresent
replicaCount: 3
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
service:
  type: ClusterIP
  port: 80
  targetPort: 8000
ingress:
  enabled: true
  # k3d v5.9.0 ships k3s v1.35.5 which bundles Traefik v2 by default.
  # Confirmed: `kubectl get ingressclass` shows "traefik" as the registered class.
  className: traefik
  # No host filter — routes all traffic so `curl http://localhost:8888/api/quote`
  # from the host works without a /etc/hosts entry (Traefik's load-balancer port
  # is mapped host:8888 → cluster:80 in scripts/00-bootstrap-cluster.sh).
  host: ""
hpa:
  minReplicas: 3
  # maxReplicas=8: at the 70% CPU threshold, 8 pods can sustain ~5.6 RPS aggregate
  # before maxing out (8 × 0.7 RPS). Enough headroom for the Part 6 load test
  # without allowing unbounded scale-out on a shared local k3d cluster.
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
# minAvailable=2 out of minReplicas=3: one pod can be disrupted at a time during
# node drains or rolling updates while maintaining >50% capacity.
pdb:
  minAvailable: 2
