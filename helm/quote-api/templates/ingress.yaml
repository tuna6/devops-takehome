{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "quote-api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "quote-api.labels" . | nindent 4 }}
spec:
  # k3d v5.9.0 ships k3s v1.35.5 which bundles Traefik v2 by default.
  # Verified: `kubectl get ingressclass` returns "traefik" with controller
  # "traefik.io/ingress-controller". Standard Kubernetes Ingress (not
  # IngressRoute CRD) is sufficient for HTTP routing in this assignment.
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - {{- if .Values.ingress.host }}
        host: {{ .Values.ingress.host }}
      {{- end }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "quote-api.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
