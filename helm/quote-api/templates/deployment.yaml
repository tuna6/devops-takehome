apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "quote-api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "quote-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "quote-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "quote-api.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        # UID 1001 matches the appuser created in the Dockerfile:
        #   adduser -S -u 1001 -G appuser -H appuser
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: quote-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          # Probes target the actual paths/port from src/main.py:
          #   @app.get("/healthz") and @app.get("/readyz") both served on port 8000.
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      affinity:
        nodeAffinity:
          # Hard constraint: never schedule on the GPU node.
          # The GPU node is already tainted NoSchedule; this adds a label guard so
          # the exclusion is visible in the chart itself, not only in the taint.
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: acme.io/node-type
                operator: NotIn
                values: ["gpu"]
          # Soft preference: score spot nodes highest (weight 100).
          # On-demand nodes score 0 for this preference but remain fully schedulable —
          # intentional so the on-demand replica is not hard-blocked.
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: acme.io/capacity
                operator: In
                values: ["spot"]
      # SOFT spread across capacity types (spot vs on-demand): ScheduleAnyway makes
      # 2-spot/1-on-demand the likely steady state without hard-blocking rescheduling
      # when a spot node disappears. DoNotSchedule would leave a pod Pending with only
      # 2 topology domains and 0 slack after one drains — exactly the reclaim scenario.
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: acme.io/capacity
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            {{- include "quote-api.selectorLabels" . | nindent 12 }}
      # SOFT spread across individual nodes — no single node takes > 1 pod at steady state.
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            {{- include "quote-api.selectorLabels" . | nindent 12 }}
